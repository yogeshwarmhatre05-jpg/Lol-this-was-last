<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YT Music Player</title>

<style>
body{
  margin:0;
  background:#000080;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.player{
  width:260px;
  max-height:180px;
  background:#1E4079;
  border:2px solid #cbd5f5;
  border-radius:10px;
  padding:8px;
  color:white;
  position:relative;
  box-sizing:border-box;
}

/* 🟢 GREEN DOT */
.live-dot{
  width:8px;
  height:8px;
  background:#00ff88;
  border-radius:50%;
  position:absolute;
  top:6px;
  left:6px;
  box-shadow:0 0 6px #00ff88;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

/* 📝 SCROLL TEXT */
.marquee{
  width:100%;
  overflow:hidden;
  white-space:nowrap;
  font-size:11px;
  margin-bottom:4px;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 6s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

/* 🎬 VIDEO */
.screen{
  width:250px;
  height:140px;
  margin:auto;
  border:2px solid #cbd5f5;
  border-radius:6px;
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* 🔘 CONTROLS (INSIDE, SPACED) */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:5px;
  padding:2px 4px;
}

button{
  background:#012349;
  color:white;
  border:1px solid #cbd5f5;
  width:28px;
  height:20px;
  border-radius:5px;
  font-size:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

button:hover{
  background:#0a2f66;
}
</style>

</head>
<body>

<div class="player">

  <div class="live-dot"></div>

  <div class="marquee">
    <span id="songText">Now Playing: </span>
  </div>

  <div class="screen">
    <iframe id="playerFrame" src="" allow="autoplay"></iframe>
  </div>

  <div class="controls">
    <button onclick="playVideo()">▶</button>
    <button onclick="pauseVideo()">■</button>
    <button onclick="nextSong()">⏭</button>
  </div>

</div>

<script>

let songs = [
  {id:"VIDEO_ID_1", name:"Song 1"},
  {id:"VIDEO_ID_2", name:"Song 2"},
  {id:"VIDEO_ID_3", name:"Song 3"},
  {id:"VIDEO_ID_4", name:"Song 4"},
  {id:"VIDEO_ID_5", name:"Song 5"},
  {id:"VIDEO_ID_6", name:"Song 6"},
  {id:"VIDEO_ID_7", name:"Song 7"},
  {id:"VIDEO_ID_8", name:"Song 8"},
  {id:"VIDEO_ID_9", name:"Song 9"},
  {id:"VIDEO_ID_10", name:"Song 10"}
];

let index = 0;
let frame = document.getElementById("playerFrame");
let text = document.getElementById("songText");

function loadVideo(i){
  frame.src = "https://www.youtube.com/embed/" + songs[i].id + "?enablejsapi=1";
  text.innerText = "Now Playing: " + songs[i].name;
}

function playVideo(){
  frame.contentWindow.postMessage(
    '{"event":"command","func":"playVideo","args":""}', '*'
  );
}

function pauseVideo(){
  frame.contentWindow.postMessage(
    '{"event":"command","func":"pauseVideo","args":""}', '*'
  );
}

function nextSong(){
  index++;
  if(index >= songs.length) index = 0;
  loadVideo(index);
}

loadVideo(index);

</script>

</body>
</html>
