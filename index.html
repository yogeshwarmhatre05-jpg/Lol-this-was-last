<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YT Music Player</title>

<style>
body{
  margin:0;
  background:#000080; /* navy blue */
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.player{
  width:270px;
  background:#1E4079;
  padding:15px;
  border-radius:12px;
  text-align:center;
  color:white;
  position:relative;
  border:2px solid #cbd5f5;
}

/* 🟢 GREEN LIVE DOT */
.live-dot{
  width:10px;
  height:10px;
  background:#00ff88;
  border-radius:50%;
  position:absolute;
  top:10px;
  left:10px;
  box-shadow:0 0 6px #00ff88, 0 0 12px #00ff88;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1); opacity:1;}
  50%{transform:scale(1.4); opacity:0.3;}
  100%{transform:scale(1); opacity:1;}
}

.screen{
  background:black;
  height:140px;
  border-radius:8px;
  margin-bottom:10px;
  overflow:hidden;
  border:2px solid #cbd5f5;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

button{
  background:#012349;
  color:white;
  border:1px solid #cbd5f5;
  padding:10px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#0a2f66;
}
</style>

</head>
<body>

<div class="player">

  <div class="live-dot"></div>

  <div class="screen">
    <iframe id="playerFrame"
      src=""
      allow="autoplay">
    </iframe>
  </div>

  <button onclick="playVideo()">Play ▶</button>
  <button onclick="pauseVideo()">Pause ⏸</button>
  <button onclick="nextSong()">Next ⏭</button>

</div>

<script>

// 🔟 ADD YOUR YOUTUBE VIDEO IDs
let songs = [
  "VIDEO_ID_1",
  "VIDEO_ID_2",
  "VIDEO_ID_3",
  "VIDEO_ID_4",
  "VIDEO_ID_5",
  "VIDEO_ID_6",
  "VIDEO_ID_7",
  "VIDEO_ID_8",
  "VIDEO_ID_9",
  "VIDEO_ID_10"
];

let index = 0;
let frame = document.getElementById("playerFrame");

function loadVideo(i){
  frame.src = "https://www.youtube.com/embed/" + songs[i] + "?enablejsapi=1";
}

function playVideo(){
  frame.contentWindow.postMessage(
    '{"event":"command","func":"playVideo","args":""}', '*'
  );
}

function pauseVideo(){
  frame.contentWindow.postMessage(
    '{"event":"command","func":"pauseVideo","args":""}', '*'
  );
}

function nextSong(){
  index++;
  if(index >= songs.length) index = 0;
  loadVideo(index);
}

// load first video
loadVideo(index);

</script>

</body>
  </html>
