<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Sidebar</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-family:Arial,sans-serif;
}

.container{
display:flex;
flex-direction:column;
gap:18px;
}

.game-btn{
padding:14px 24px;
background:#22c55e;
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
border-radius:14px;
text-align:center;
box-shadow:0 0 15px rgba(34,197,94,0.45);
transition:0.2s;
min-width:320px;
}

.game-btn:hover{
transform:scale(1.05);
background:#16a34a;
}

</style>
</head>

<body>

<div class="container">

<a 
class="game-btn"
href="https://poki.com/en/g/soccer-skills-world-cup" 
target="_blank"
>
⚽ Soccer Skills World Cup
</a>

<a 
class="game-btn"
href="https://poki.com/en/g/vectaria-io" 
target="_blank"
>
🧱 Vectaria.io
</a>

<a 
class="game-btn"
href="https://poki.com/en/g/blockheads" 
target="_blank"
>
🎮 Blockheads
</a>

</div>

</body>
</html>
