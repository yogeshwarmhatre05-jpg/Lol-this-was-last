<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YT Music Player</title>

<style>
body{
  margin:0;
  background:#112D4E;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.player{
  width:260px;
  max-height:180px;
  background:#1E4079;
  border:2px solid #cbd5f5;
  border-radius:10px;
  padding:8px;
  color:white;
  position:relative;
  box-sizing:border-box;
}

.live-dot{
  width:8px;
  height:8px;
  background:#00ff88;
  border-radius:50%;
  position:absolute;
  top:6px;
  left:6px;
  box-shadow:0 0 6px #00ff88;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

.marquee{
  width:100%;
  overflow:hidden;
  white-space:nowrap;
  font-size:11px;
  margin-bottom:4px;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 6s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

.screen{
  width:100%;
  aspect-ratio:16/9;
  border:2px solid #cbd5f5;
  border-radius:6px;
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:5px;
}

button{
  background:#012349;
  color:white;
  border:1px solid #cbd5f5;
  width:28px;
  height:20px;
  border-radius:5px;
  font-size:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

button:hover{
  background:#0a2f66;
}
</style>

</head>
<body>

<div class="player">

  <div class="live-dot"></div>

  <div class="marquee">
    <span id="songText">Now Playing:</span>
  </div>

  <div class="screen">
    <iframe 
      id="playerFrame" 
      src="" 
      allow="autoplay; fullscreen" 
      allowfullscreen>
    </iframe>
  </div>

  <div class="controls">
    <button onclick="playVideo()">▶</button>
    <button onclick="pauseVideo()">❚❚</button>
    <button onclick="nextSong()">⏭</button>
  </div>

</div>

<script>

let songs = [
  {src:"https://youtu.be/qdpXxGPqW-Y", name:"Faded - Alan Walker"},
  {src:"https://youtu.be/kcsGhOmULxQ", name:"Golden Brown - The Stranglers"},
  {src:"https://youtu.be/9I9c20LHmzY", name:"Come As You Are - Nirvana"},
  {src:"https://youtu.be/SDNA934EEVk", name:"A Walk - Tycho"}, 
  {src:"https://youtu.be/A3xxG5zHuCA", name:"Passo Bem Solto - ATLXS"}
];

let index = 0;
let frame = document.getElementById("playerFrame");
let text = document.getElementById("songText");

function convert(url){
  if(url.includes("youtu.be")){
    let id = url.split("youtu.be/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + id + "?enablejsapi=1";
  }
  if(url.includes("watch?v=")){
    let id = url.split("v=")[1].split("&")[0];
    return "https://www.youtube.com/embed/" + id + "?enablejsapi=1";
  }
  return url;
}

function loadVideo(i){
  frame.src = convert(songs[i].src);
  text.innerText = "Now Playing: " + songs[i].name;
}

function playVideo(){
  frame.contentWindow.postMessage(
    '{"event":"command","func":"playVideo","args":""}', '*'
  );
}

function pauseVideo(){
  frame.contentWindow.postMessage(
    '{"event":"command","func":"pauseVideo","args":""}', '*'
  );
}

function nextSong(){
  index++;
  if(index >= songs.length) index = 0;
  loadVideo(index);
}

loadVideo(index);

</script>

</body>
</html>
