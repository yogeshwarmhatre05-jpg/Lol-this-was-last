<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Skills World Cup Button</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-family:Arial, sans-serif;
}

.play-btn{
padding:14px 24px;
background:#22c55e;
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
border-radius:14px;
box-shadow:0 0 15px rgba(34,197,94,0.5);
transition:0.2s;
}

.play-btn:hover{
transform:scale(1.05);
background:#16a34a;
}

</style>
</head>

<body>

<a 
class="play-btn"
href="https://soccerskillsworldcup.com/" 
target="_blank"
>
⚽ Play Soccer Skills World Cup
</a>

</body>
</html>
